services:
  - type: web
    name: aurexcart-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        value: ashar.aurex
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
