<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ─── SEO Meta Tags ─────────────────────────────────────────────── -->
    <title>AurexCart — Multi-Vendor Marketplace | Shop, Sell & Discover</title>
    <meta name="description" content="AurexCart is a cutting-edge multi-vendor marketplace for digital products, art, illustrations, electronics, and more. Create your store, sell globally, and discover unique items." />
    <meta name="keywords" content="aurexcart, multi-vendor marketplace, digital products, online store, dropshipping, e-commerce, buy, sell, art, illustrations" />
    <meta name="author" content="Aurex Labs" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://aurexcart.vercel.app" />

    <!-- ─── Open Graph ────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aurexcart.vercel.app" />
    <meta property="og:title" content="AurexCart — Multi-Vendor Marketplace" />
    <meta property="og:description" content="Shop, sell, and discover. The premium multi-vendor marketplace for digital products, art, and more." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="AurexCart" />

    <!-- ─── Twitter Card ──────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AurexCart — Multi-Vendor Marketplace" />
    <meta name="twitter:description" content="Shop, sell, and discover. The premium multi-vendor marketplace." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- ─── Favicon ───────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#000000" />

    <!-- ─── Fonts ─────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- ─── Structured Data ───────────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "AurexCart",
      "url": "https://aurexcart.vercel.app",
      "description": "Multi-vendor marketplace for digital products, art, and more",
      "publisher": {
        "@type": "Organization",
        "name": "Aurex Labs",
        "url": "https://aurexlabs.netlify.app"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://aurexcart.vercel.app/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body class="bg-black text-white overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
