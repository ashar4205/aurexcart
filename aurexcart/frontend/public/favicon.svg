<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#000000"/>
  <!-- Hexagon background glow -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" fill="none" stroke="url(#glowGrad)" stroke-width="2" opacity="0.6"/>
  <!-- A letter stylized -->
  <path d="M20 48 L32 16 L44 48" stroke="url(#blueGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M24 38 L40 38" stroke="url(#neonGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Top glow dot -->
  <circle cx="32" cy="14" r="3" fill="#00D1FF" opacity="0.9"/>
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D1FF"/>
      <stop offset="100%" stop-color="#0052FF"/>
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052FF"/>
      <stop offset="100%" stop-color="#00D1FF"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D1FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0052FF" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>
